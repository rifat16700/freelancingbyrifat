<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Freelancing By Rifat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --maroon:        #800000;
            --maroon-light:  #A52A2A;
            --maroon-dark:   #5C0000;
            --maroon-soft:   rgba(128, 0, 0, 0.12);
            --white:         #FFFFFF;
            --off-white:     #FAF8F8;
            --text-dark:     #1A0A0A;
            --text-mid:      #5C3A3A;
            --text-light:    #9E7070;
            --border:        rgba(128, 0, 0, 0.15);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #F5EDED;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* ── Animated Maroon Blur Orbs ── */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            animation: floatOrb 10s ease-in-out infinite;
        }
        .orb-1 {
            width: 480px; height: 480px;
            background: radial-gradient(circle, rgba(128,0,0,0.30) 0%, rgba(128,0,0,0.08) 50%, transparent 70%);
            top: -140px; left: -140px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 380px; height: 380px;
            background: radial-gradient(circle, rgba(165,42,42,0.25) 0%, rgba(92,0,0,0.06) 50%, transparent 70%);
            bottom: -120px; right: -120px;
            animation-delay: -5s;
        }
        .orb-3 {
            width: 260px; height: 260px;
            background: radial-gradient(circle, rgba(128,0,0,0.18) 0%, transparent 70%);
            top: 40%; left: 60%;
            animation-delay: -2.5s;
            animation-duration: 13s;
        }
        .orb-4 {
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(165,42,42,0.20) 0%, transparent 70%);
            top: 20%; right: 25%;
            animation-delay: -7s;
            animation-duration: 8s;
        }
        @keyframes floatOrb {
            0%, 100% { transform: translateY(0px) scale(1); }
            33%       { transform: translateY(-25px) scale(1.04); }
            66%       { transform: translateY(15px) scale(0.97); }
        }

        /* subtle dot grid */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(128,0,0,0.12) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Login Card ── */
        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 430px;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 28px;
            padding: 46px 40px 40px;
            box-shadow:
                0 4px 6px rgba(128,0,0,0.04),
                0 20px 60px rgba(128,0,0,0.12),
                0 0 0 1px rgba(128,0,0,0.06);
            overflow: hidden;
        }

        /* top accent bar */
        .card-accent {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--maroon-dark), var(--maroon), var(--maroon-light));
            border-radius: 28px 28px 0 0;
        }

        /* inner corner decoration */
        .card-deco {
            position: absolute;
            top: -40px; right: -40px;
            width: 130px; height: 130px;
            background: radial-gradient(circle, rgba(128,0,0,0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* ── Header ── */
        .login-header { text-align: center; margin-bottom: 34px; }

        .logo-wrap {
            width: 68px; height: 68px;
            background: linear-gradient(135deg, var(--maroon-dark) 0%, var(--maroon-light) 100%);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 18px;
            box-shadow: 0 8px 28px rgba(128,0,0,0.30), 0 2px 6px rgba(128,0,0,0.20);
        }

        .logo-wrap svg { color: #fff; }

        .login-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 5px;
            letter-spacing: -0.3px;
        }

        .login-sub {
            font-size: 13px;
            color: var(--text-light);
            font-weight: 500;
        }

        /* ── Form ── */
        .form-group { margin-bottom: 18px; }

        .form-label {
            display: block;
            font-size: 11.5px;
            font-weight: 700;
            color: var(--text-mid);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 8px;
        }

        .input-wrap { position: relative; }

        .input-icon {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            display: flex; align-items: center;
            pointer-events: none;
            transition: color 0.2s;
        }

        .form-input {
            width: 100%;
            padding: 13px 16px 13px 42px;
            background: var(--white);
            border: 1.5px solid rgba(128, 0, 0, 0.15);
            border-radius: 13px;
            font-family: inherit;
            font-size: 14.5px;
            color: var(--text-dark);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-input::placeholder { color: #C4A8A8; }

        .form-input:focus {
            border-color: var(--maroon);
            box-shadow: 0 0 0 3.5px rgba(128, 0, 0, 0.12);
        }

        .form-input:focus + .focus-ring { opacity: 1; }

        /* icon turns maroon on input focus */
        .input-wrap:focus-within .input-icon { color: var(--maroon); }

        /* password toggle */
        .pass-toggle {
            position: absolute;
            right: 13px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            cursor: pointer;
            color: var(--text-light);
            padding: 4px;
            display: flex; align-items: center;
            transition: color 0.2s;
        }
        .pass-toggle:hover { color: var(--maroon); }

        /* ── Login Button ── */
        .login-btn {
            width: 100%;
            padding: 14.5px 20px;
            background: linear-gradient(135deg, var(--maroon-dark) 0%, var(--maroon) 50%, var(--maroon-light) 100%);
            background-size: 200% 200%;
            background-position: left center;
            border: none;
            border-radius: 50px;
            color: var(--white);
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.2px;
            cursor: pointer;
            margin-top: 26px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 6px 22px rgba(128,0,0,0.28), 0 2px 6px rgba(128,0,0,0.18);
            transition: all 0.3s ease;
        }

        .login-btn:hover:not(:disabled) {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(128,0,0,0.35), 0 4px 10px rgba(128,0,0,0.20);
        }

        .login-btn:active:not(:disabled) { transform: translateY(0); }
        .login-btn:disabled { opacity: 0.65; cursor: not-allowed; }

        /* spinning loader */
        .spinner {
            width: 20px; height: 20px;
            border: 2.5px solid rgba(255,255,255,0.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.65s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Toast Notifications ── */
        #toastContainer {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 1000;
            display: flex; flex-direction: column; gap: 10px;
        }

        .toast {
            background: var(--white);
            border-left: 4px solid var(--maroon);
            color: var(--text-dark);
            padding: 14px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(128,0,0,0.15);
            display: flex; align-items: center; gap: 10px;
            font-size: 13.5px; font-weight: 500;
            transform: translateX(130%);
            transition: transform 0.35s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            min-width: 260px;
            max-width: 340px;
        }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: var(--maroon); }
        .toast.success { border-left-color: #2e7d32; }

        /* ── Success Redirect Overlay ── */
        .redirect-msg {
            display: none;
            text-align: center;
            padding: 16px 0 4px;
            color: #2e7d32;
            font-size: 14px;
            font-weight: 600;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .redirect-msg.show { display: flex; }

        /* ── Footer ── */
        .login-footer {
            text-align: center;
            margin-top: 26px;
            font-size: 11.5px;
            color: var(--text-light);
        }

    </style>
</head>
<body>

    <!-- Animated Maroon Blur Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <!-- Login Card -->
    <div class="login-card">
        <div class="card-accent"></div>
        <div class="card-deco"></div>

        <!-- Header -->
        <div class="login-header">
            <div class="logo-wrap">
                <!-- Shield icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    <path d="M9 12l2 2 4-4"></path>
                </svg>
            </div>
            <h1 class="login-title">Admin Login</h1>
            <p class="login-sub">Freelancing By Rifat — Control Panel</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm">

            <!-- Email -->
            <div class="form-group">
                <label class="form-label" for="loginEmail">Email Address</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                        </svg>
                    </span>
                    <input type="email" id="loginEmail" class="form-input"
                           placeholder="admin@example.com" required autocomplete="email">
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="form-label" for="loginPass">Password</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </span>
                    <input type="password" id="loginPass" class="form-input"
                           placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="pass-toggle" id="passToggle" onclick="togglePass()" aria-label="Show/hide password">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="login-btn" id="loginBtn">
                <span id="loginBtnContent">
                    Login to Dashboard
                    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                         style="margin-left:4px;">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </span>
            </button>
        </form>

        <!-- Success redirect msg -->
        <div class="redirect-msg" id="redirectMsg">
            <div class="spinner" style="border-top-color:#2e7d32;border-color:rgba(46,125,50,0.25);"></div>
            <span>Redirecting to dashboard...</span>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            Freelancing By Rifat &copy; 2025 &mdash; Admin Panel
        </div>
    </div>

    <script>
        // ══ CONFIGURATION ══
        var ADMIN_EMAIL    = 'rifatrabbi10@gmail.com';
        var ADMIN_PASSWORD = 'rifat@admin2025';
        var SESSION_KEY    = 'fbr_admin_auth';
        var SUPABASE_URL      = 'https://qdkppbwjgkkxzgzgsykv.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFka3BwYndqZ2treHpnemdzeWt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMzY2NjgsImV4cCI6MjA5MDgxMjY2OH0.i1x16UGnM_4C2hVGZS9JreM2FJDxsIYeiHkA4BMOfrk';

        // ══ ERROR DISPLAY (For Debugging) ══
        window.onerror = function(msg, url, line) {
            showToast("JS Error: " + msg, "error");
            return false;
        };

        // ══ SAFE SUPABASE INIT ══
        var sb = null;
        try {
            if (typeof supabase !== 'undefined') {
                sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch(e) {
            console.error("Supabase init failed", e);
        }

        var passVisible = false;

        // ── Check if already logged in ──────────────────────────
        try {
            if (localStorage.getItem(SESSION_KEY) === 'true') {
                window.location.href = 'dashboard.html';
            }
        } catch(e) {}

        // ── Password visibility toggle ──────────────────────────
        function togglePass() {
            passVisible = !passVisible;
            var input = document.getElementById('loginPass');
            input.type = passVisible ? 'text' : 'password';
            document.getElementById('eyeIcon').innerHTML = passVisible
                ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line>'
                : '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="3"></circle>';
        }

        // ── Toast notification ──────────────────────────────────
        function showToast(message, type) {
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast ' + (type || 'info');

            var iconSvg = (type === 'success')
                ? '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2e7d32" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>'
                : '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';

            toast.innerHTML = iconSvg + '<span>' + message + '</span>';
            container.appendChild(toast);

            setTimeout(function() { toast.classList.add('show'); }, 10);

            setTimeout(function() {
                toast.classList.remove('show');
                setTimeout(function() { toast.remove(); }, 350);
            }, 3500);
        }

        // ══ Login form submit ─────────────────────────────────────
        var form = document.getElementById('loginForm');
        if(form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                var email      = document.getElementById('loginEmail').value.trim();
                var pass       = document.getElementById('loginPass').value;
                var btn        = document.getElementById('loginBtn');
                var btnContent = document.getElementById('loginBtnContent');
                var originalHTML = btnContent.innerHTML;

                btn.disabled = true;
                btnContent.innerHTML = '<div class="spinner"></div><span>Logging in...</span>';

                // ══ PRIMARY: Hardcoded check (instant, no network) ══
                if (email === ADMIN_EMAIL && pass === ADMIN_PASSWORD) {
                    localStorage.setItem(SESSION_KEY, 'true');
                    localStorage.setItem(SESSION_KEY + '_email', email);
                    showToast('Login successful! Redirecting...', 'success');
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('redirectMsg').classList.add('show');
                    setTimeout(function() {
                        window.location.href = 'dashboard.html';
                    }, 800);
                    return;
                }

                // ══ FALLBACK: Supabase Auth ══
                if (sb) {
                    sb.auth.signInWithPassword({ email: email, password: pass })
                    .then(function(response) {
                        if (response.error) {
                            showToast('❌ ' + (response.error.message || 'Login failed. Check email & password.'), 'error');
                            btn.disabled = false;
                            btnContent.innerHTML = originalHTML;
                            return;
                        }
                        if (response.data && response.data.session) {
                            localStorage.setItem(SESSION_KEY, 'true');
                            localStorage.setItem(SESSION_KEY + '_email', email);
                            showToast('Login successful! Redirecting...', 'success');
                            document.getElementById('loginForm').style.display = 'none';
                            document.getElementById('redirectMsg').classList.add('show');
                            setTimeout(function() { window.location.href = 'dashboard.html'; }, 800);
                        }
                    })
                    .catch(function() {
                        showToast('❌ Network error. Please try again.', 'error');
                        btn.disabled = false;
                        btnContent.innerHTML = originalHTML;
                    });
                } else {
                    showToast('❌ Incorrect Email or Password.', 'error');
                    btn.disabled = false;
                    btnContent.innerHTML = originalHTML;
                }
            });
        });
    </script>
</body>
</html>
