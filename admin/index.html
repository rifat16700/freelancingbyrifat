<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Freelancing By Rifat</title>
    <!-- Explicit CSP to allow Supabase, external scripts, and eval -->
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/supabase-init.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --maroon:        #800000;
            --maroon-light:  #A52A2A;
            --maroon-dark:   #5C0000;
            --maroon-soft:   rgba(128, 0, 0, 0.12);
            --white:         #FFFFFF;
            --off-white:     #FAF8F8;
            --text-dark:     #1A0A0A;
            --text-mid:      #5C3A3A;
            --text-light:    #9E7070;
            --border:        rgba(128, 0, 0, 0.15);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #F5EDED;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* ── Animated Maroon Blur Orbs ── */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            animation: floatOrb 10s ease-in-out infinite;
        }
        .orb-1 {
            width: 480px; height: 480px;
            background: radial-gradient(circle, rgba(128,0,0,0.30) 0%, rgba(128,0,0,0.08) 50%, transparent 70%);
            top: -140px; left: -140px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 380px; height: 380px;
            background: radial-gradient(circle, rgba(165,42,42,0.25) 0%, rgba(92,0,0,0.06) 50%, transparent 70%);
            bottom: -120px; right: -120px;
            animation-delay: -5s;
        }
        .orb-3 {
            width: 260px; height: 260px;
            background: radial-gradient(circle, rgba(128,0,0,0.18) 0%, transparent 70%);
            top: 40%; left: 60%;
            animation-delay: -2.5s;
            animation-duration: 13s;
        }
        .orb-4 {
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(165,42,42,0.20) 0%, transparent 70%);
            top: 20%; right: 25%;
            animation-delay: -7s;
            animation-duration: 8s;
        }
        @keyframes floatOrb {
            0%, 100% { transform: translateY(0px) scale(1); }
            33%       { transform: translateY(-25px) scale(1.04); }
            66%       { transform: translateY(15px) scale(0.97); }
        }

        /* subtle dot grid */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(128,0,0,0.12) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Login Card ── */
        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 430px;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 28px;
            padding: 46px 40px 40px;
            box-shadow:
                0 4px 6px rgba(128,0,0,0.04),
                0 20px 60px rgba(128,0,0,0.12),
                0 0 0 1px rgba(128,0,0,0.06);
            overflow: hidden;
        }

        /* top accent bar */
        .card-accent {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--maroon-dark), var(--maroon), var(--maroon-light));
            border-radius: 28px 28px 0 0;
        }

        /* inner corner decoration */
        .card-deco {
            position: absolute;
            top: -40px; right: -40px;
            width: 130px; height: 130px;
            background: radial-gradient(circle, rgba(128,0,0,0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* ── Header ── */
        .login-header { text-align: center; margin-bottom: 34px; }

        .logo-wrap {
            width: 68px; height: 68px;
            background: linear-gradient(135deg, var(--maroon-dark) 0%, var(--maroon-light) 100%);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 18px;
            box-shadow: 0 8px 28px rgba(128,0,0,0.30), 0 2px 6px rgba(128,0,0,0.20);
        }

        .logo-wrap svg { color: #fff; }

        .login-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 5px;
            letter-spacing: -0.3px;
        }

        .login-sub {
            font-size: 13px;
            color: var(--text-light);
            font-weight: 500;
        }

        /* ── Form ── */
        .form-group { margin-bottom: 18px; }

        .form-label {
            display: block;
            font-size: 11.5px;
            font-weight: 700;
            color: var(--text-mid);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 8px;
        }

        .input-wrap { position: relative; }

        .input-icon {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            display: flex; align-items: center;
            pointer-events: none;
            transition: color 0.2s;
        }

        .form-input {
            width: 100%;
            padding: 13px 16px 13px 42px;
            background: var(--white);
            border: 1.5px solid rgba(128, 0, 0, 0.15);
            border-radius: 13px;
            font-family: inherit;
            font-size: 14.5px;
            color: var(--text-dark);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-input::placeholder { color: #C4A8A8; }

        .form-input:focus {
            border-color: var(--maroon);
            box-shadow: 0 0 0 3.5px rgba(128, 0, 0, 0.12);
        }

        .form-input:focus + .focus-ring { opacity: 1; }

        /* icon turns maroon on input focus */
        .input-wrap:focus-within .input-icon { color: var(--maroon); }

        /* password toggle */
        .pass-toggle {
            position: absolute;
            right: 13px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            cursor: pointer;
            color: var(--text-light);
            padding: 4px;
            display: flex; align-items: center;
            transition: color 0.2s;
        }
        .pass-toggle:hover { color: var(--maroon); }

        /* ── Login Button ── */
        .login-btn {
            width: 100%;
            padding: 14.5px 20px;
            background: linear-gradient(135deg, var(--maroon-dark) 0%, var(--maroon) 50%, var(--maroon-light) 100%);
            background-size: 200% 200%;
            background-position: left center;
            border: none;
            border-radius: 50px;
            color: var(--white);
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.2px;
            cursor: pointer;
            margin-top: 26px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 6px 22px rgba(128,0,0,0.28), 0 2px 6px rgba(128,0,0,0.18);
            transition: all 0.3s ease;
        }

        .login-btn:hover:not(:disabled) {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(128,0,0,0.35), 0 4px 10px rgba(128,0,0,0.20);
        }

        .login-btn:active:not(:disabled) { transform: translateY(0); }
        .login-btn:disabled { opacity: 0.65; cursor: not-allowed; }

        /* spinning loader */
        .spinner {
            width: 20px; height: 20px;
            border: 2.5px solid rgba(255,255,255,0.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.65s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Toast Notifications ── */
        #toastContainer {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 1000;
            display: flex; flex-direction: column; gap: 10px;
        }

        .toast {
            background: var(--white);
            border-left: 4px solid var(--maroon);
            color: var(--text-dark);
            padding: 14px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(128,0,0,0.15);
            display: flex; align-items: center; gap: 10px;
            font-size: 13.5px; font-weight: 500;
            transform: translateX(130%);
            transition: transform 0.35s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            min-width: 260px;
            max-width: 340px;
        }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: var(--maroon); }
        .toast.success { border-left-color: #2e7d32; }

        /* ── Success Redirect Overlay ── */
        .redirect-msg {
            display: none;
            text-align: center;
            padding: 16px 0 4px;
            color: #2e7d32;
            font-size: 14px;
            font-weight: 600;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .redirect-msg.show { display: flex; }

        /* ── Footer ── */
        .login-footer {
            text-align: center;
            margin-top: 26px;
            font-size: 11.5px;
            color: var(--text-light);
        }

    </style>
</head>
<body>

    <!-- Animated Maroon Blur Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <!-- Login Card -->
    <div class="login-card">
        <div class="card-accent"></div>
        <div class="card-deco"></div>

        <!-- Header -->
        <div class="login-header">
            <div class="logo-wrap">
                <!-- Shield icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    <path d="M9 12l2 2 4-4"></path>
                </svg>
            </div>
            <h1 class="login-title">Admin Login</h1>
            <p class="login-sub">Freelancing By Rifat — Control Panel</p>
        </div>

        <!-- Login Form (removed <form> wrapper behavior to strictly prevent reloads) -->
        <div id="loginForm">

            <!-- Email (Step 1) -->
            <div id="stepEmail">
                <div class="form-group">
                    <label class="form-label" for="loginEmail">Email Address</label>
                    <div class="input-wrap">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                            </svg>
                        </span>
                        <input type="email" id="loginEmail" class="form-input"
                               placeholder="your.email@example.com" required autocomplete="email">
                    </div>
                </div>

                <!-- Submit Button for OTP -->
                <button type="button" class="login-btn" id="sendOtpBtn" onclick="sendOtp()">
                    <span id="sendOtpBtnContent">
                        Send OTP Code
                        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                             style="margin-left:4px;">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </span>
                </button>
            </div>

            <!-- OTP (Step 2) -->
            <div id="stepOtp" style="display: none; margin-top: 20px;">
                <div class="form-group">
                    <label class="form-label" for="loginOtp">Security Code (OTP)</label>
                    <div class="input-wrap">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </span>
                        <input type="text" id="loginOtp" class="form-input"
                               placeholder="Enter 6-digit code" required autocomplete="one-time-code" maxlength="6">
                    </div>
                </div>

                <!-- Verify Button -->
                <button type="button" class="login-btn" id="verifyOtpBtn" onclick="verifyOtp()">
                    <span id="verifyOtpBtnContent">
                        Verify & Login
                        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                             style="margin-left:4px;">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </span>
                </button>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="javascript:void(0)" onclick="resetStep()" style="color: var(--text-light); font-size: 13px; text-decoration: none; font-weight: 500;">&larr; Use a different email</a>
                </div>
            </div>
        </div>

        <!-- Success redirect msg -->
        <div class="redirect-msg" id="redirectMsg">
            <div class="spinner" style="border-top-color:#2e7d32;border-color:rgba(46,125,50,0.25);"></div>
            <span>Redirecting to dashboard...</span>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            Freelancing By Rifat &copy; 2025 &mdash; Admin Panel
        </div>
    </div>

    <script>
        // Use global `CONFIG` and `sb` from ../assets/js/ config files

        // ── Toast notification ──────────────────────────────────
        function showToast(message, type) {
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast ' + (type || 'info');

            var iconSvg = (type === 'success')
                ? '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2e7d32" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>'
                : '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';

            toast.innerHTML = iconSvg + '<span>' + message + '</span>';
            container.appendChild(toast);

            setTimeout(function() { toast.classList.add('show'); }, 10);

            setTimeout(function() {
                toast.classList.remove('show');
                setTimeout(function() { toast.remove(); }, 350);
            }, 3500);
        }

        // ── Check session automatically ─────────────────────────
        function checkSession() {
            sb.auth.getSession().then(function(res) {
                var session = res.data && res.data.session;
                if (session) {
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('redirectMsg').classList.add('show');
                    window.location.href = 'dashboard.html';
                }
            });
        }
        
        // Wait for DOM
        document.addEventListener('DOMContentLoaded', function() {
            console.log("DOM Loaded - OTP Auth UI ready");
            checkSession();
        });

        function resetStep() {
            document.getElementById('stepOtp').style.display = 'none';
            document.getElementById('stepEmail').style.display = 'block';
            document.getElementById('loginOtp').value = '';
        }

        // ══ Send OTP ──────────────────────────────────
        function sendOtp() {
            var email = document.getElementById('loginEmail').value.trim();
            var btn = document.getElementById('sendOtpBtn');
            var btnContent = document.getElementById('sendOtpBtnContent');
            var originalHTML = btnContent.innerHTML;

            if (!email) {
                showToast('Please enter your valid email.', 'error');
                return;
            }

            btn.disabled = true;
            btnContent.innerHTML = '<div class="spinner"></div><span>Sending OTP...</span>';

            sb.auth.signInWithOtp({ email: email }).then(function(res) {
                if (res.error) {
                    showToast('❌ Error: ' + res.error.message, 'error');
                    btn.disabled = false;
                    btnContent.innerHTML = originalHTML;
                } else {
                    showToast('✅ OTP sent to your email!', 'success');
                    document.getElementById('stepEmail').style.display = 'none';
                    document.getElementById('stepOtp').style.display = 'block';
                    btn.disabled = false;
                    btnContent.innerHTML = originalHTML;
                }
            }).catch(function(err) {
                showToast('❌ A network error occurred.', 'error');
                btn.disabled = false;
                btnContent.innerHTML = originalHTML;
            });
        }

        // ══ Verify OTP ──────────────────────────────────
        function verifyOtp() {
            var email = document.getElementById('loginEmail').value.trim();
            var otp   = document.getElementById('loginOtp').value.trim();
            var btn   = document.getElementById('verifyOtpBtn');
            var btnContent = document.getElementById('verifyOtpBtnContent');
            var originalHTML = btnContent.innerHTML;

            if (!otp || otp.length !== 6) {
                showToast('Please enter the 6-digit OTP.', 'error');
                return;
            }

            btn.disabled = true;
            btnContent.innerHTML = '<div class="spinner"></div><span>Verifying...</span>';

            sb.auth.verifyOtp({
                email: email,
                token: otp,
                type: 'email'
            }).then(function(res) {
                if (res.error) {
                    showToast('❌ Invalid or expired OTP.', 'error');
                    btn.disabled = false;
                    btnContent.innerHTML = originalHTML;
                } else {
                    showToast('✅ Verification successful!', 'success');
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('redirectMsg').classList.add('show');
                    setTimeout(function() { window.location.href = 'dashboard.html'; }, 600);
                }
            }).catch(function(err) {
                showToast('❌ A network error occurred.', 'error');
                btn.disabled = false;
                btnContent.innerHTML = originalHTML;
            });
        }
    </script>
</body>
</html>
